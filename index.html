<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NexusEngine ProtoKits</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #06111f;
        color: #edf8ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:

          radial-gradient(circle at 80% 60%, rgba(37, 221, 255, 0.12), transparent 32rem),
          #06111f;
      }

      main {
        width: min(760px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 6vw, 68px);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      p {
        max-width: 62ch;
        color: rgba(237, 248, 255, 0.72);
        font-size: 18px;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        margin-top: 18px;
        padding: 0 18px;
        border-radius: 8px;
        background: #b7f3ff;
        color: #03111d;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NexusEngine ProtoKits</h1>
      <p>Prototype kits for proving game-specific systems before they become stable NexusEngine surfaces.</p>
