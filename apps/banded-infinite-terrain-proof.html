<!doctype html>
<meta charset="utf-8">
<title>Banded Infinite Terrain Kit Proof</title>
<body style="margin:0;background:#071018;color:white;font-family:system-ui">
<canvas id="c"></canvas>
<div style="position:fixed;left:12px;top:12px;background:rgba(0,0,0,.55);padding:10px;border-radius:10px;font-size:12px">Banded Infinite Terrain Kit Proof<br>WASD move, right drag look<br><span id="s"></span></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
import { createBandedTerrainState, advanceBandedTerrainState, createBandedTerrainRenderContract } from '../protokits/banded-infinite-terrain-kit/index.js';
let terrainState = createBandedTerrainState({ snapSize: 4, maxRadius: 1400 });
const cameraPose = { x: 0, y: 90, z: 0, yaw: 0, pitch: -0.5 };
const keys = new Set();
const scene = new THREE.Scene();
scene.background = new THREE.Color('#88a5bd');
scene.fog = new THREE.FogExp2('#88a5bd', 0.0015);
const camera = new THREE.PerspectiveCamera(64, innerWidth / innerHeight, 0.1, 6000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
scene.add(new THREE.HemisphereLight(0xc8e2ff, 0x3d432d, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 2.3); sun.position.set(320, 500, 200); scene.add(sun);
function makeRadial(rings = 112, segments = 224, maxRadius = 1400, power = 2.25) {
  const p = [0, 0, 0], ring = [0], idx = [];
  for (let r = 1; r <= rings; r++) {
    const t = r / rings, rad = maxRadius * Math.pow(t, power);
    for (let s = 0; s < segments; s++) { const a = s / segments * Math.PI * 2; p.push(Math.sin(a) * rad, 0, Math.cos(a) * rad); ring.push(t); }
  }
  const at = (r, s) => 1 + (r - 1) * segments + ((s % segments) + segments) % segments;
  for (let s = 0; s < segments; s++) idx.push(0, at(1, s), at(1, s + 1));
  for (let r = 1; r < rings; r++) for (let s = 0; s < segments; s++) { const a = at(r, s), b = at(r, s + 1), c = at(r + 1, s), d = at(r + 1, s + 1); idx.push(a, c, b, b, c, d); }
  const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.Float32BufferAttribute(p, 3)); g.setAttribute('ringT', new THREE.Float32BufferAttribute(ring, 1)); g.setIndex(idx); return g;
}
const terrainFns = `float hash21(vec2 p){p=fract(p*vec2(234.34,435.345));p+=dot(p,p+34.23);return fract(p.x*p.y);}float valueNoise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float a=hash21(i),b=hash21(i+vec2(1,0)),c=hash21(i+vec2(0,1)),d=hash21(i+vec2(1,1));return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}float fbm(vec2 p){float sum=0.0,amp=.5,freq=1.0;for(int i=0;i<6;i++){sum+=valueNoise(p*freq)*amp;freq*=2.03;amp*=.52;}return sum;}float ridged(vec2 p){float n=fbm(p);n=1.0-abs(n*2.0-1.0);return n*n;}float terrainHeight(vec2 worldXZ){vec2 warp=vec2(fbm(worldXZ*.0018+vec2(41.7,9.2)),fbm(worldXZ*.0018+vec2(-17.3,55.1)))*440.0;vec2 q=worldXZ+warp;float continent=fbm(q*.00055);float mountains=ridged(q*.0012)*210.0;float hills=fbm(q*.0034)*65.0;float river=abs(fbm(q*.0011+vec2(9.0,3.0))-.5);return (continent-.42)*170.0+mountains+hills+fbm(q*.015)*10.0-smoothstep(.07,0.0,river)*90.0;}vec3 terrainNormal(vec2 worldXZ){float e=4.0;float hL=terrainHeight(worldXZ-vec2(e,0)),hR=terrainHeight(worldXZ+vec2(e,0)),hD=terrainHeight(worldXZ-vec2(0,e)),hU=terrainHeight(worldXZ+vec2(0,e));return normalize(vec3(hL-hR,e*2.0,hD-hU));}`;
const mat = new THREE.ShaderMaterial({ uniforms: { uOrigin: { value: new THREE.Vector2() }, uCameraXZ: { value: new THREE.Vector2() }, uForward: { value: new THREE.Vector2(0,1) }, uFar: { value: 1400 } }, vertexShader: `attribute float ringT;uniform vec2 uOrigin;varying vec3 vWorld;varying vec3 vNormal;varying float vRing;${terrainFns}void main(){vec2 worldXZ=uOrigin+position.xz;float h=terrainHeight(worldXZ)*1.2;vWorld=vec3(worldXZ.x,h,worldXZ.y);vNormal=terrainNormal(worldXZ);vRing=ringT;gl_Position=projectionMatrix*modelViewMatrix*vec4(position.x,h,position.z,1.0);}`, fragmentShader: `precision highp float;uniform vec2 uCameraXZ;uniform vec2 uForward;uniform float uFar;varying vec3 vWorld;varying vec3 vNormal;varying float vRing;void main(){vec3 n=normalize(vNormal);float light=clamp(dot(n,normalize(vec3(.45,.86,.28)))*.55+.45,.16,1.0);float d=length(vWorld.xz-uCameraXZ);vec2 dir=normalize(vWorld.xz-uCameraXZ);float vd=dot(dir,normalize(uForward));vec3 color=mix(vec3(.18,.28,.18),vec3(.68,.56,.34),smoothstep(-60.0,260.0,vWorld.y));color=mix(color,vec3(.46,.43,.39),1.0-clamp(n.y,0.0,1.0));vec3 band=d<96.0?vec3(.36,.82,1.0):(d<280.0?vec3(.34,.85,.44):(d<720.0?vec3(.95,.70,.30):vec3(.56,.58,.67)));color=mix(color,band,.24);color*=light;color=mix(color,vec3(.54,.64,.74),smoothstep(520.0,uFar,d)*.5);gl_FragColor=vec4(color,1.0);}` });
const mesh = new THREE.Mesh(makeRadial(), mat); mesh.frustumCulled = false; scene.add(mesh);
let dragging = false, last = performance.now();
addEventListener('keydown', e => keys.add(e.code)); addEventListener('keyup', e => keys.delete(e.code)); addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
renderer.domElement.oncontextmenu = e => e.preventDefault(); renderer.domElement.onpointerdown = e => { if (e.button === 2) dragging = true; }; renderer.domElement.onpointerup = () => dragging = false; renderer.domElement.onpointermove = e => { if (!dragging) return; cameraPose.yaw -= e.movementX * .0032; cameraPose.pitch = Math.max(-1.35, Math.min(-.08, cameraPose.pitch - e.movementY * .0024)); };
function frame(now){ const dt = Math.min((now-last)/1000,.05); last=now; const f = new THREE.Vector3(Math.sin(cameraPose.yaw),0,Math.cos(cameraPose.yaw)); const r = new THREE.Vector3(Math.cos(cameraPose.yaw),0,-Math.sin(cameraPose.yaw)); const m = new THREE.Vector3(); if(keys.has('KeyW'))m.add(f); if(keys.has('KeyS'))m.sub(f); if(keys.has('KeyD'))m.add(r); if(keys.has('KeyA'))m.sub(r); if(m.lengthSq()){m.normalize(); const b=(keys.has('ShiftLeft')||keys.has('ShiftRight'))?3.5:1; cameraPose.x += m.x*72*b*dt; cameraPose.z += m.z*72*b*dt;} if(keys.has('KeyE'))cameraPose.y+=72*dt; if(keys.has('KeyQ'))cameraPose.y-=72*dt; terrainState = advanceBandedTerrainState(terrainState, { dt, camera: cameraPose, cameraForward: { x: Math.sin(cameraPose.yaw), z: Math.cos(cameraPose.yaw) } }); const contract = createBandedTerrainRenderContract(terrainState); mesh.position.set(contract.uniforms.terrainOriginSnapped.x,0,contract.uniforms.terrainOriginSnapped.z); mat.uniforms.uOrigin.value.set(contract.uniforms.terrainOriginSnapped.x,contract.uniforms.terrainOriginSnapped.z); mat.uniforms.uCameraXZ.value.set(contract.uniforms.cameraSmoothed.x,contract.uniforms.cameraSmoothed.z); mat.uniforms.uForward.value.set(contract.uniforms.cameraForwardSmoothed.x,contract.uniforms.cameraForwardSmoothed.z); const dir = new THREE.Vector3(Math.sin(cameraPose.yaw)*Math.cos(cameraPose.pitch),Math.sin(cameraPose.pitch),Math.cos(cameraPose.yaw)*Math.cos(cameraPose.pitch)); camera.position.set(cameraPose.x,cameraPose.y,cameraPose.z); camera.lookAt(camera.position.clone().add(dir)); document.getElementById('s').textContent = `origin ${contract.uniforms.terrainOriginSnapped.x}, ${contract.uniforms.terrainOriginSnapped.z} | frac ${contract.uniforms.fractionalCameraOffset.x.toFixed(2)}, ${contract.uniforms.fractionalCameraOffset.z.toFixed(2)}`; renderer.render(scene,camera); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
</body>
