<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blackwake Isles Canvas App</title>
    <style>
      :root { color-scheme: dark; background: #020814; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; background: #020814; }
      .boot { position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 100; padding: 12px 14px; border: 1px solid rgba(177,229,255,.24); border-radius: 12px; background: rgba(2,8,18,.72); color: #ecfbff; font: 13px/1.4 system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <canvas id="game" aria-label="Blackwake Isles playable canvas app"></canvas>
    <div class="boot" id="boot">Loading Blackwake Isles...</div>
    <script type="module">
      const nexusUrl = "https://cdn.jsdelivr.net/gh/" + "LuminaryLabs-Dev/NexusRealtime@main/src/index.js";
      const NexusRealtime = await import(nexusUrl);
      const mod = await import("../../protokits/blackwake-game-isles/index.js");
      const boot = document.getElementById("boot");
      const game = mod.createBlackwakeIslesGame(NexusRealtime, {
        canvas: document.getElementById("game"),
        seed: new URLSearchParams(location.search).get("seed") || "blackwake-public-demo-001",
        onUpdate({ state }) {
          if (boot) boot.textContent = `Running frame ${state.frame} seed ${state.seed}`;
          if (boot && state.frame > 90) boot.remove();
        }
      });
      game.start();
    </script>
  </body>
</html>
