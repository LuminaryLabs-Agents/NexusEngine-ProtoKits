<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projected Route Demo</title></head>
<body>
<main><pre id="out">Loading…</pre></main>
<script type="module">
  import { createProjectedRoute } from "./index.js";
  const route = createProjectedRoute({ routeId: "browser-demo", path: { type: "linear", start: { x: 0, y: 0 }, end: { x: 100, y: 400 } }, sampling: { count: 6, seed: "browser" }, projection: { method: "plane" } });
  document.querySelector("#out").textContent = JSON.stringify(route, null, 2);
</script>
</body>
</html>
