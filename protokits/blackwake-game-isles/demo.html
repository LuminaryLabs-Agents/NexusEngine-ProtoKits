<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blackwake Isles Three.js ProtoKit Demo</title>
    <style>
      :root { color-scheme: dark; background: #020814; }
      html, body { margin: 0; height: 100%; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; background: #020814; }
    </style>
  </head>
  <body>
    <canvas id="game" aria-label="Blackwake Isles Three.js ProtoKit demo"></canvas>
    <script type="module">
      const nexusUrl = "https://cdn.jsdelivr.net/gh/" + "LuminaryLabs-Dev/NexusEngine@main/src/index.js";
      const threeUrl = "https://cdn.jsdelivr.net/npm/" + "three@0.160.0/build/three.module.js";
      const [NexusEngine, THREE, mod] = await Promise.all([
        import(nexusUrl),
        import(threeUrl),
        import("./index.js")
      ]);
      const game = mod.createBlackwakeIslesGame(NexusEngine, {
        canvas: document.getElementById("game"),
        renderer: "three",
        three: THREE,
        seed: new URLSearchParams(location.search).get("seed") || "blackwake-public-demo-001"
      });
      game.start();
    </script>
  </body>
</html>
