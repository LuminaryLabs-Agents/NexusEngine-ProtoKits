<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blackwake Isles Playable ProtoKit Demo</title>
    <style>
      :root {
        color-scheme: dark;
        background: #020814;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #020814;
      }
    </style>
  </head>
  <body>
    <canvas id="game" aria-label="Blackwake Isles playable ProtoKit demo"></canvas>

    <script type="module">
      import * as NexusRealtime from "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusRealtime@main/src/index.js";
      import { createBlackwakeIslesGame } from "./index.js";

      const game = createBlackwakeIslesGame(NexusRealtime, {
        canvas: document.getElementById("game"),
        seed: new URLSearchParams(location.search).get("seed") || "blackwake-public-demo-001"
      });

      game.start();
    </script>
  </body>
</html>
