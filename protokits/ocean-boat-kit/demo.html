<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NexusRealtime Ocean Boat Kit Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020814;
        color: #eaf8ff;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      aside {
        position: fixed;
        left: 16px;
        top: 16px;
        width: min(430px, calc(100vw - 32px));
        padding: 12px 14px;
        border: 1px solid rgba(170, 220, 255, 0.22);
        border-radius: 10px;
        background: rgba(2, 8, 18, 0.55);
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: rgba(234, 248, 255, 0.72);
        font-size: 13px;
        line-height: 1.35;
      }

      dl {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0 0;
      }

      .metric {
        padding: 8px;
        border: 1px solid rgba(170, 220, 255, 0.16);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.055);
      }

      dt {
        color: rgba(234, 248, 255, 0.58);
        font-size: 10px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      dd {
        margin: 3px 0 0;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }

      kbd {
        color: #b9f4ff;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <canvas id="ocean" aria-label="NexusRealtime Ocean Boat Kit demo"></canvas>
    <aside>
      <h1>NexusRealtime Ocean Boat Kit</h1>
      <p><kbd>WASD</kbd> or arrows steer the boat. This demo loads the Ocean Boat Kit as a module and runs the same import surface intended for CDN use.</p>
      <dl>
        <div class="metric"><dt>Speed</dt><dd id="speed">0 kn</dd></div>
        <div class="metric"><dt>Throttle</dt><dd id="throttle">0%</dd></div>
        <div class="metric"><dt>Kit</dt><dd>ocean-boat</dd></div>
      </dl>
    </aside>

    <script type="module">
      import { createOceanBoatKit } from "./index.js";

      const fallbackNexusRealtime = {
        createRealtimeGame({ update, render }) {
          let running = false;
          let last = 0;

          function frame(now) {
            if (!running) return;
            const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
            last = now;
            update(dt, now / 1000);
            render();
            requestAnimationFrame(frame);
          }

          return {
            start() {
              if (running) return;
              running = true;
              last = performance.now();
              requestAnimationFrame(frame);
            },
            stop() {
              running = false;
            }
          };
        },
        createTerrainKit() {
          return { id: "nexusrealtime-terrain-kit-adapter" };
        },
        createRenderDescriptorKit() {
          return { id: "nexusrealtime-render-descriptor-adapter" };
        },
        createRealismKit() {
          return { id: "nexusrealtime-realism-adapter" };
        }
      };

      const speed = document.getElementById("speed");
      const throttle = document.getElementById("throttle");
      const kit = createOceanBoatKit(fallbackNexusRealtime);

      const game = kit.createOceanBoatGame({
        canvas: document.getElementById("ocean"),
        onUpdate(state) {
          speed.textContent = `${Math.abs(state.boat.velocity * 1.94).toFixed(1)} kn`;
          throttle.textContent = `${Math.round(Math.max(0, state.boat.throttle) * 100)}%`;
        }
      });

      game.start();
    </script>
  </body>
</html>
